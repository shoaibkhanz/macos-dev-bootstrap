# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
# after-startup-command = [
#     # 'exec-and-forget sketchybar',
#     'exec-and-forget borders active_color=0xffffffff inactive_color=0x00000000 width=4.0'
# ]

# Notify sketchybar when workspace changes
# exec-on-workspace-change = ['/bin/bash', '-c',
#   '/Users/shoaib.khan/.config/sketchybar/plugins/aerospace.sh'
# ]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 10

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = 'move-mouse window-lazy-center'

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodness#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# Possible values: (qwery|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 5
inner.vertical =   5
outer.left =       5
outer.bottom =     5
outer.top =        -45
outer.right =      5

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-ctrl-f = 'layout tiling'
alt-ctrl-shift-f = 'layout floating'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'
alt-period = 'focus --boundaries-action wrap-around-the-workspace dfs-next'
alt-shift-period = 'focus --boundaries-action wrap-around-the-workspace dfs-prev'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#fullscreen
alt-f = 'fullscreen'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-w = 'workspace W' # work
alt-c = 'workspace C' # communication
alt-m = 'workspace M' # music
alt-p = 'workspace P' # personal

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-w = 'move-node-to-workspace W' # work 
alt-shift-c = 'move-node-to-workspace C' # communication
alt-shift-m = 'move-node-to-workspace M' # music
alt-shift-p = 'move-node-to-workspace P' # personal

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
#s = ['layout sticky tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']


# ============================================
# Floating rules for apps that don't tile well
# ============================================

# Finder - has many window types (dialogs, Quick Look, etc.) that break tiling
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout tiling'

# System Settings / System Preferences
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout tiling'

[[on-window-detected]]
if.app-id = 'com.apple.systemsettings'
run = 'layout tiling'

# Common VPN clients - add your work VPN app-id here
# Run `aerospace list-apps` while VPN is open to find the exact ID
# [[on-window-detected]]
# if.app-id = 'com.amazon.awsvpnclient'
# run = 'layout floating'

# [[on-window-detected]]
# if.app-id = 'com.cisco.anyconnect.gui'
# run = 'layout floating'

# Archive Utility (extracting files)
[[on-window-detected]]
if.app-id = 'com.apple.archiveutility'
run = 'layout floating'

# Calculator
[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

# Keychain Access
[[on-window-detected]]
if.app-id = 'com.apple.keychainaccess'
run = 'layout floating'

# Activity Monitor
[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout tiling'

# App Store
[[on-window-detected]]
if.app-id = 'com.apple.AppStore'
run = 'layout tiling'

# Preview (for quick viewing)
[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'layout tiling'

# 1Password and other password managers
[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.agilebits.onepassword7'
run = 'layout floating'

# Zoom - meeting controls should float
[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = 'layout floating'

# Utility / menu-bar style apps that are better as floating windows
[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'me.damir.dropover-mac'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.devuap.beautyshotapp'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'net.rafaelconde.Hand-Mirror'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'leits.MeetingBar'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.herf.Flux'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.if.Amphetamine'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.imagestudiopro.ScreenBrush'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.pais.handy'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.superultra.Homerow'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.example.keyviz'
run = 'layout floating'

# ============================================
# Workspace assignment rules
# ============================================

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['move-node-to-workspace C']

[[on-window-detected]]
if.app-id = 'com.Spotify.client'
run = ['move-node-to-workspace M']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = '(?i)mail'
run = ['move-node-to-workspace C']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = '(?i)calendar'
run = ['move-node-to-workspace C']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
if.window-title-regex-substring = '(?i)youtube'
run = ['move-node-to-workspace C']
