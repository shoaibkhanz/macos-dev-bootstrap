################################################################################
#                                GENERAL SETTINGS                               #
################################################################################
# This config is tuned for long-lived sessions running multiple AI agents in
# parallel. Key themes:
#   - Persistence: resurrect + continuum auto-restore after reboot
#   - Observability: activity monitoring so you notice when an agent finishes
#   - Multi-pane ergonomics: sync, clear, log, and layout bindings
#   - Big scrollback: agents produce a lot of output

# Terminal Setup — tmux-256color is the modern default; the override enables
# true 24-bit RGB so agent output (syntax highlights, diffs) renders correctly.
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:RGB'

# Propagate Python venv activation into new panes so agents inherit the env.
set-option -ga update-environment "VIRTUAL_ENV"

# Prefix change to Ctrl-a — easier to reach than the default C-b, and C-a on
# the home row plays nicely with vim-style bindings throughout the config.
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Start window/pane numbering at 1 (matches keyboard layout: 1 is leftmost).
set -g base-index 1
setw -g pane-base-index 1

# Allow Kitty graphics passthrough (for image.nvim in Ghostty / Kitty).
set -gq allow-passthrough on

# ── Agent observability ─────────────────────────────────────────────────────
# monitor-activity marks background windows with a "*" in the status bar when
# output appears — so you know when an agent in another window has finished
# thinking. visual-activity off suppresses the intrusive message popup.
set -g monitor-activity on
set -g visual-activity off

# General options
set -g mouse on                  # Click to select panes/windows; drag to resize
set -g renumber-windows on       # Keep window numbers gap-free after closing one
set -g set-clipboard on          # Sync tmux copy buffer with system clipboard
set -g focus-events on           # Required for Neovim autoread + git-status refresh
set -g status-interval 2         # Refresh status bar every 2s (CPU/mem/clock)
set -g status-left-length 200
set -g status-position top
set -sg escape-time 10           # Low latency for ESC in Neovim, but not 0 (flaky on SSH)
set-option -g history-limit 50000  # Large scrollback — agents generate a lot of output
set -g display-panes-time 3000   # Pane number overlay stays up 3s — useful with many panes

################################################################################
#                                 KEY BINDINGS                                  #
################################################################################

# ── Splits — open in the current pane's directory, not $HOME ────────────────
# $ = horizontal split (panes side-by-side), ( = vertical split (stacked).
# Non-default keys chosen so muscle memory doesn't fight the shifted symbols.
unbind %
bind $ split-window -h -c "#{pane_current_path}"
unbind '"'
bind ( split-window -v -c "#{pane_current_path}"

# New window also inherits the current directory.
bind c new-window -c "#{pane_current_path}"

# prefix + r → reload this config without restarting tmux.
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ── Pane resizing (repeatable: hold prefix, tap key multiple times) ─────────
# The -r flag means you don't need to re-press prefix between taps.
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# Same resize action on hjkl for vim muscle memory.
# NOTE: this overrides default `prefix + l` (last-window). Use `prefix + L`
# (uppercase) as a workaround if you need last-window back.
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# prefix + m → maximize (zoom) the current pane to fullscreen; press again to restore.
bind -r m resize-pane -Z

# ── Agent-friendly extras ───────────────────────────────────────────────────
# prefix + S → toggle "synchronize-panes": every keystroke goes to ALL panes
# in the current window. Useful for activating a venv or running `git pull`
# across a row of agent panes at once. Status bar shows [SYNC] when on.
bind S set-window-option synchronize-panes \; display-message "sync-panes #{?pane_synchronized,ON,OFF}"

# prefix + K → clear the visible screen AND wipe scrollback history for this
# pane. Handy when an agent has flooded the buffer and you want a clean slate.
bind K send-keys -R \; clear-history \; display-message "pane cleared"

# prefix + H → toggle logging the current pane to ~/tmux-logs/<session>-<window>-<pane>.log
# Useful for archiving an agent's full output for later review. Toggle again to stop.
bind H pipe-pane -o "cat >> ~/tmux-logs/#S-#I-#P.log" \; display-message "logging toggled → ~/tmux-logs/#S-#I-#P.log"

# Quick layout presets — switch between common multi-agent arrangements.
bind M-1 select-layout even-horizontal    # all panes in a row
bind M-2 select-layout even-vertical      # all panes stacked
bind M-3 select-layout main-horizontal    # one large top pane + strip below
bind M-4 select-layout main-vertical      # one large left pane + strip right
bind M-5 select-layout tiled              # grid

# ── Copy mode (vi-style) ────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection   # v = start selection
bind-key -T copy-mode-vi 'y' send -X copy-selection    # y = yank to clipboard
# Don't exit copy-mode when the mouse is released — lets you keep scrolling.
unbind -T copy-mode-vi MouseDragEnd1Pane

################################################################################
#                             PLUGIN MANAGEMENT                                 #
################################################################################
# Managed by TPM. Install new plugins with `prefix + I`, update with `prefix + U`.

set -g @plugin 'tmux-plugins/tpm'                          # the plugin manager itself
set -g @plugin 'christoomey/vim-tmux-navigator'            # Ctrl-hjkl to move between vim+tmux panes seamlessly

# Persistence — absolutely critical for agent workflows. resurrect saves the
# full session (windows, panes, cwd, pane contents); continuum auto-saves
# every 15 min and auto-restores on tmux start, so an OS reboot doesn't kill
# a day's worth of agent state.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'               # save what's on screen
set -g @continuum-restore 'on'                             # auto-restore on tmux boot
set -g @continuum-save-interval '5'                        # save every 5 min (default 15)

# tmux-yank gives proper OS clipboard integration for `y` in copy mode —
# works across macOS, Linux (X11/Wayland), and SSH via OSC52. Lets you copy
# agent output and paste it into a browser / ticket.
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'darko-mesaros/aws-tmux'                    # AWS profile indicator
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'    # nerd-font icons per app
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'            # #{cpu} / #{mem} in status bar

# Auto-install TPM on a fresh machine so this config is portable.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

################################################################################
#                            YUGEN THEME (BETTERVIM)                           #
################################################################################
# Yugen colors derived from BetterVim Yugen theme
# bg:   #000000 (near-black purpleish)
# fg:   #D4D4D4 (soft gray)
# acc:  #FFBE89 (peach)
# green:#7EAB8E (soft green)
# border:#2A2733 (dark muted)

# Match Neovim/Yugen background to remove the "line gap" under status bar
set -g window-style 'bg=#000000'
set -g window-active-style 'bg=#000000'

# Status line base
set -g status on
set -g status-bg "#000000"
set -g status-fg "#D4D4D4"
set -g status-style "bg=#000000,fg=#D4D4D4"

# Status formatting
set -g status-justify left 
set -g window-status-separator ""

# Left side: Session name with peach accent block
set -g status-left-length 40
set -g status-left '#[bg=#000000,fg=#FFFFFF,bold]  #S #[bg=#050409,fg=#000000]'

# Right side: prefix/sync indicators + CPU/MEM/Clock.
# #{?client_prefix,...} shows orange [^A] while prefix is held — helps spot
# stuck prefix and is great for screen recordings.
# #{?pane_synchronized,...} shows red [SYNC] when you're broadcasting input
# to every pane in the window (toggle with prefix + S).
set -g status-right-length 160
set -g status-right '#[fg=#FFBE89,bold]#{?client_prefix,[^A] ,}#[fg=#FF6B6B,bold]#{?pane_synchronized,[SYNC] ,} #[fg=#FFFFFF] #{cpu} #[fg=#FFFFFF]| 󰍛 #{mem} #[fg=#FFFFFF]| %Y-%m-%d %H:%M '

# Window tabs — inactive
set -g window-status-style 'bg=#050409,fg=#777777'
set -g window-status-format ' #[fg=#555555]#I|#W '

# Active window — peach highlight
set -g window-status-current-style 'bg=#050409,fg=#FFFFFF,bold'
set -g window-status-current-format ' #[fg=#FFFFFF,bold,underscore]#I|#W '

# Pane borders
set -g pane-border-style 'fg=#2A2733'
set -g pane-active-border-style 'fg=#FFBE89'

# Messages (prefix, notifications)
set -g message-style 'bg=#050409,fg=#FFBE89'
set -g message-command-style 'bg=#050409,fg=#D4D4D4'

# Override any elements that might use color99 with explicit black/white styling
set -g window-status-bell-style 'bg=#000000,fg=#FFFFFF'
set -g window-status-activity-style 'bg=#000000,fg=#FFFFFF'

################################################################################
#                               WINDOW NAMING                                   #
################################################################################
# Smart auto-rename:
#   - If the pane is running a shell (zsh/bash/fish/sh), show the current
#     directory's basename — e.g. "pydantic_ai_tutorial".
#   - Otherwise show the running command — e.g. "nvim", "python", "claude".
# `#{m:*sh,...}` is tmux's glob match operator; `#{b:path}` is basename.
# You can still override manually with `prefix + ,` — that sticks until the
# window closes and disables auto-rename for that window.

set -wg automatic-rename on
set -g automatic-rename-format '#{?#{m:*sh,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}'

################################################################################
#                           INITIALIZE TPM (BOTTOM)                             #
################################################################################
# extended-keys forwards modern keycodes (e.g. Ctrl+Shift+letters) via CSI u,
# so Neovim and other apps running inside tmux see the full keyboard.
set -g extended-keys on
set -g extended-keys-format csi-u

# TPM must be sourced LAST — plugins can set options that override the config
# above, so anything below this line will take final precedence.
run '~/.tmux/plugins/tpm/tpm'

# Force copy-mode selection highlight after plugins load (some plugins reset it).
set -wg mode-style 'bg=#3a3a3a,fg=#e0e0e0,bold'
