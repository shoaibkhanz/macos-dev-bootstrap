[mcp]
presets = []

[mcp.mcpServers]

[diagnostics]
enabled = false
sql_linter = true

[runtime]
reactive_tests = true
default_auto_download = ["html"]
std_stream_max_bytes = 1000000
watcher_on_save = "lazy"
auto_reload = "lazy"
default_csv_encoding = "utf-8"
default_sql_output = "auto"
output_max_bytes = 8000000
auto_instantiate = false
show_tracebacks = false
on_cell_change = "lazy"

[display]
code_editor_font_size = 16
dataframes = "rich"
default_table_max_columns = 50
cell_output = "below"
theme = "dark"
default_table_page_size = 15
reference_highlighting = false
default_width = "medium"
custom_css = ["__HOME__/.config/marimo/marimo-code.css"]

[package_management]
manager = "uv"

[keymap]
destructive_delete = true
preset = "vim"
vimrc = "__HOME__/.config/marimo/marimo-vimrc"

[keymap.overrides]

[language_servers.ty]
enabled = false

[language_servers.basedpyright]
enabled = true

[language_servers.pylsp]
enable_flake8 = false
enable_pyflakes = false
enable_mypy = true
enable_pydocstyle = false
enabled = false
enable_ruff = true
enable_pylint = false

[server]
browser = "default"
follow_symlink = false

[experimental]
table_charts = true
external_agents = true

[save]
format_on_save = true
autosave = "after_delay"
autosave_delay = 1000

[ai]
mode = "manual"
rules = ""

[ai.google]

[ai.models]
displayed_models = []
custom_models = []

[ai.custom_providers]

[ai.anthropic]
# api_key sourced from ANTHROPIC_API_KEY env var (set in ~/.secrets)

[ai.open_ai]
# api_key sourced from OPENAI_API_KEY env var (set in ~/.secrets)
model = "claude-opus-4-20250514"

[ai.bedrock]

[formatting]
line_length = 79

[completion]
activate_on_typing = true
signature_hint_on_typing = false
copilot = false

[snippets]
custom_paths = []
include_default_snippets = true
